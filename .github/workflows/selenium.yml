name: OrangeHRM Automation

on:
  push:
    branches:
      - main

jobs:
  selenium-tests:

    runs-on: windows-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Verify Java
        run: java -version

      - name: Verify Maven
        run: mvn -version

      - name: Run TestNG Suite
        run: mvn test -DsuiteXmlFile=testng.xml

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestReports
          path: test-output/